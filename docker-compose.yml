version: '3.8'

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=restaurant_pos
      - DB_PORT=5432
      - SECRET_KEY=IndusHotelPOS_JWT_S3cr3tKey_2026!@#Change_In_Prod
      - FRONTEND_URL=http://localhost:3000
      - PYTHONUNBUFFERED=1
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
      - "80:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://api:8000
    depends_on:
      - api

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: restaurant_pos
    # Port 5432 is NOT exposed to the host — only the Docker network can reach it
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
